   5. 存檔引擎（localStorage 版）
   ================================================================ */
const DEF = {v:6,xp:0,energy:50,coins:0,completed:{},cards:[],weak:[]};

function loadSave() {
  try {
    const r = localStorage.getItem("aidc-v6");
    if (r) {
      const s = JSON.parse(r);
      if (s.v === 6) return s;
    }
    // v5 遷移
    const r5 = localStorage.getItem("aidc-v5");
    if (r5) {
      const s5 = JSON.parse(r5);
      return { ...s5, v:6 };
    }
    return {...DEF};
  } catch { return {...DEF}; }
}
function persistSave(s) {
  try { localStorage.setItem("aidc-v6", JSON.stringify(s)); } catch(e) {}
}

/* ================================================================
   6. 資料工具（從 game-data.js 的全域變數取資料）
   ================================================================ */
function getRegionLevels(region) {
  return LEVELS.filter(lv => lv.region === region && lv.kind !== 'repair');
}
function getAllRegions() {
  const seen = new Set();
  const regions = [];
  for (const lv of LEVELS) {
    if (lv.kind === 'repair' || seen.has(lv.region)) continue;
    seen.add(lv.region);
    regions.push(lv.region);
  }
  return regions;
}
function getRepairLevel() {
  return LEVELS.find(lv => lv.kind === 'repair');
}

  const done = id => !!p.completed[id];
  const unlocked = lv => !lv.req || done(lv.req);

  // 自動排列座標
  const positionedLvs = useMemo(() => {
    return lvs.map((lv, i) => ({
      ...lv,
      _x: lv.x || Math.round(12 + (i % 4) * 22),
      _y: lv.y || Math.round(18 + Math.floor(i / 4) * 24 + (i % 2) * 10),
    }));
  }, [lvs]);

  const doneCount = lvs.filter(l => done(l.id)).length;
  const IconComponent = REGION_ICONS[region] || FoundationIcon;

  return (
    <div style={{animation:"bounceIn .5s"}}>

            <IconComponent size={20} />
          </div>
          {theme.name}
        </span>
        <Badge color={K.green}>{doneCount}/{lvs.length} 關</Badge>
      </div>

      <Panel bg={`linear-gradient(180deg, ${theme.bg1} 0%, ${theme.bg2} 100%)`}
        style={{minHeight:Math.max(320, Math.ceil(lvs.length/4)*120),padding:0,overflow:"hidden",position:"relative"}}>

        {/* Parallax rolling hills background */}
        <svg style={{position:"absolute", bottom:0, left:0, width:"100%", height:"65%", zIndex:1, pointerEvents:"none"}} viewBox="0 0 100 100" preserveAspectRatio="none">
          {/* Far Hills */}
          <path d="M 0,100 L 0,45 C 20,32 35,58 50,45 C 65,32 80,52 100,40 L 100,100 Z" fill={theme.bg3} opacity="0.65"/>
          {/* Near Hills */}
          <path d="M 0,100 L 0,58 C 25,48 45,68 70,52 C 85,42 95,58 100,48 L 100,100 Z" fill={theme.bg4}/>
        </svg>

        {/* Floating clouds inside region */}
        <div style={{position:"absolute", inset:0, zIndex:1, pointerEvents:"none", overflow:"hidden"}}>
          <svg width="40" height="20" viewBox="0 0 60 30" style={{position:"absolute", top:"8%", left:"12%", opacity:0.35}}>
            <path d="M 10,20 C 10,14 16,10 22,12 C 25,8 35,8 38,12 C 44,10 50,14 50,20 C 52,24 48,28 42,28 L 18,28 C 12,28 8,24 10,20 Z" fill="#FFF"/>
          </svg>
          <svg width="30" height="15" viewBox="0 0 60 30" style={{position:"absolute", top:"18%", left:"78%", opacity:0.25}}>
            <path d="M 10,20 C 10,14 16,10 22,12 C 25,8 35,8 38,12 C 44,10 50,14 50,20 C 52,24 48,28 42,28 L 18,28 C 12,28 8,24 10,20 Z" fill="#FFF"/>
          </svg>
        </div>

        {/* 路徑連線 */}
        <svg style={{position:"absolute",inset:0,width:"100%",height:"100%",zIndex:2}} viewBox="0 0 100 100" preserveAspectRatio="none">
          {positionedLvs.map((lv,i) => {
            const nx = positionedLvs[i+1];
            if(!nx) return null;
            
            const dx = nx._x - lv._x;
            const dy = nx._y - lv._y;
            let cx1, cy1, cx2, cy2;
            if (Math.abs(dx) > Math.abs(dy)) {
              // Mostly horizontal
              cx1 = lv._x + dx * 0.4;
              cy1 = lv._y + (dx > 0 ? -4 : 4);
              cx2 = nx._x - dx * 0.4;
              cy2 = nx._y + (dx > 0 ? 4 : -4);
            } else {
              // Mostly vertical
              cx1 = lv._x + (dy > 0 ? 4 : -4);
              cy1 = lv._y + dy * 0.4;
              cx2 = nx._x + (dy > 0 ? -4 : 4);
              cy2 = nx._y - dy * 0.4;
            }
            const d = `M ${lv._x} ${lv._y} C ${cx1} ${cy1}, ${cx2} ${cy2}, ${nx._x} ${nx._y}`;
            const act = done(lv.id);
            return <g key={i}>
              <path d={d} fill="none" stroke="#FFFFFF" strokeWidth="7" strokeLinecap="round" vectorEffect="non-scaling-stroke" opacity=".92"/>
              <path d={d} fill="none" stroke={act?K.yellow:"#C9BCA4"} strokeWidth="3.4" strokeDasharray="1 9" strokeLinecap="round"
                vectorEffect="non-scaling-stroke" style={{animation:act?"pathDash 1s linear infinite":"none"}}/>
            </g>;
          })}
        </svg>

        {/* 關卡節點 */}
        {positionedLvs.map(lv => {
          const ok = unlocked(lv), fin = done(lv.id);
          const BossC = BOSS_MAP[lv.boss?.key] || MistBoss;
          return (
            <div key={lv.id} onClick={() => ok && onEnter(lv)} style={{position:"absolute",left:`${lv._x}%`,top:`${lv._y}%`,
              transform:"translate(-50%,-50%)",textAlign:"center",width:100,cursor:ok?"pointer":"not-allowed",zIndex:3}}>
              <div style={{width:58,height:58,margin:"0 auto",borderRadius:"50%",
                background:fin?K.yellow:ok?(lv.c||theme.accent):"#C9BCA4",border:`4.5px solid ${K.ink}`,
                display:"flex",alignItems:"center",justifyContent:"center",
                boxShadow:`0 5px 0 ${K.ink}44`,
                animation:ok&&!fin?"pressHint 1.4s infinite":"none",
                filter:ok?"none":"grayscale(.55)",overflow:"hidden"}}>
                {fin
                  ? <StarIcon size={30}/>
                  : ok
                    ? <div style={{transform:"scale(.72) translateY(3px)"}}><BossC size={52}/></div>
                    : <svg width="22" height="22" viewBox="0 0 24 24"><rect x="5" y="10" width="14" height="10" rx="3" fill="#8B7A66" stroke={K.ink} strokeWidth="2"/><path d="M8 10V7a4 4 0 0 1 8 0v3" fill="none" stroke={K.ink} strokeWidth="2.6"/></svg>}
              </div>
              <div style={{marginTop:5,display:"inline-block",background:"#fff",border:`3px solid ${K.ink}`,borderRadius:10,
                padding:"2px 8px",fontSize:10,fontWeight:900,color:K.ink,boxShadow:`0 2px 0 ${K.ink}33`,
                maxWidth:96,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {lv.name}
              </div>
            </div>
          );
        })}
      </Panel>
    </div>
  );
}

/* ================================================================
   11. 戰鬥
   ================================================================ */
function Battle({level,p,onWin,onBack,repairTags}) {
  const isCalc = level.kind === "calc";
  const isRepair = level.kind === "repair";
  const isComparison = level.kind === "comparison";
  const isVendor = level.kind === "vendor";

  // 取題目池
  const pool = useMemo(() => {
    if (isRepair) {
      // 修復模式：找所有包含弱點 tag 的題目
      const allQ = [];
      for (const key of Object.keys(QUIZ)) {
        for (const q of (QUIZ[key]||[])) {
          if (repairTags.includes(q.tag)) allQ.push(q);
        }
      }
      return allQ.length > 0 ? allQ.sort(() => Math.random() - 0.5) : [{d:1,q:"暫無題目",opts:["A","B","C","D"],ans:0,tag:"",ex:""}];
    }
    if (isCalc && typeof genCalc === 'function') return [];
    
    // 隨機抽題：依難度分組並在組內隨機打亂，以保持難度遞增的體驗
    const qs = (QUIZ[level.id]||[]).slice();
    if (qs.length === 0) {
      return [{d:1,q:"此關卡的題目正在準備中",opts:["跳過此題","選項B","選項C","選項D"],ans:0,tag:"demo",ex:"題目尚未生成"}];
    }
    
    const byDiff = {};
    for (const item of qs) {
      if (!byDiff[item.d]) byDiff[item.d] = [];
      byDiff[item.d].push(item);
    }
    
    const sorted = [];
    const diffs = Object.keys(byDiff).sort((a,b) => Number(a) - Number(b));
    for (const d of diffs) {
      const group = byDiff[d].sort(() => Math.random() - 0.5);
      sorted.push(...group);
    }
    return sorted;
  }, [level, isRepair, isCalc, repairTags]);

  const [calcStage,setCalcStage] = useState(0);
  const [prob,setProb] = useState(isCalc && typeof genCalc === 'function' ? genCalc(0) : null);
  const [idx,setIdx] = useState(0);
  const [picked,setPicked] = useState(null);
  const [input,setInput] = useState("");
  const [show,setShow] = useState(false);
  const [ok,setOk] = useState(false);
  const [bossHp,setBossHp] = useState(100);
  const [heat,setHeat] = useState(20);
  const [energy,setEnergy] = useState(p.energy);
  const [combo,setCombo] = useState(0);
  const [maxCombo,setMaxCombo] = useState(0);
  const [miss,setMiss] = useState([]);
  const [hit,setHit] = useState(false);
  const [dmg,setDmg] = useState(null);
  const [removed,setRemoved] = useState([]);
  const [hint,setHint] = useState(false);
  const [tries,setTries] = useState(0);
  const total = isCalc ? 3 : pool.length;
  const q = pool[idx];
  const rage = bossHp <= 40;
  const BossC = BOSS_MAP[level.boss?.key] || MistBoss;
  const curD = isCalc ? (prob?.d||1) : (q?.d||1);

  const fire = (correct,tag) => {
    setShow(true); setOk(correct);
    if (correct) {
      const base = isCalc ? 34 : Math.ceil(100/total);
      const d = base + combo*3 + (curD-1)*4;
      setBossHp(h=>Math.max(0,h-d));
      setCombo(c=>{const n=c+1;setMaxCombo(m=>Math.max(m,n));return n;});
      setEnergy(e=>Math.min(99,e+15)); setHeat(h=>Math.max(0,h-12));
      setHit(true); 
      setDmg({
        v: isVendor ? `+${d}%` : `-${d}${combo>=2?`  x${combo+1}!`:""}`,
        c: isVendor ? K.greenD : K.blueD
      });
      setTimeout(()=>{setHit(false);setDmg(null);},900);
    } else {
      setCombo(0); setHeat(h=>Math.min(100,h+(rage?18:14)));
      if (tag&&!miss.includes(tag)) setMiss(m=>[...m,tag]);
      setDmg({v: isVendor ? "退回審查" : "好燙！",c:K.redD});
      setTimeout(()=>setDmg(null),900);
    }
  };

  const checkCalc = () => {
    const v = parseFloat(input); if (isNaN(v) || !prob) return;
    const good = Math.abs(v-prob.answer)/prob.answer <= 0.05;
    if (!good) setTries(t=>t+1);
    fire(good, "CDU計算");
  };

  const next = () => {
    setPicked(null); setShow(false); setRemoved([]); setHint(false); setInput("");
    if (isCalc) {
      if (ok) {
        if (calcStage >= 2) { finish(); return; }
        const ns = calcStage+1; setCalcStage(ns);
        if (typeof genCalc === 'function') setProb(genCalc(ns));
      }
    } else if (idx+1>=total||bossHp<=0) finish();
    else setIdx(idx+1);
  };
  const finish = () => {
    const grade = heat>=100 ? "B" : miss.length===0&&tries===0 ? "S" : "A";
    onWin({grade,maxCombo,miss,energyLeft:energy});
  };

  const skillFreeze = () => {
    if (energy<30||show||isCalc||!q) return;
    const w = q.opts.map((_,i)=>i).filter(i=>i!==q.ans&&!removed.includes(i));
    if (!w.length) return;
    setRemoved(r=>[...r,w[Math.floor(Math.random()*w.length)]]); setEnergy(e=>e-30);
  };
  const skillCFD = () => { if (energy<40||show) return; setHint(true); setEnergy(e=>e-40); };

  return (
    <div style={{animation:"bounceIn .4s"}}>
      <Panel bg={isVendor ? "#E8EAF6" : isComparison ? (rage ? "#F3E5F5" : "#EDE7F6") : rage?"#FFE0DB":"#FFEDE8"} shake={hit} style={{padding:"14px 16px",position:"relative",
        borderColor:isVendor ? K.navyD : isComparison ? K.purpleD : rage?K.redD:K.ink,transition:"all .4s"}}>
        {dmg&&<div style={{position:"absolute",top:-6,right:24,fontSize:24,fontWeight:900,color:dmg.c,
          textShadow:"2px 2px 0 #fff",animation:"dmgFly 1s forwards",zIndex:10}}>{dmg.v}</div>}
        {rage && !isVendor && !isComparison && <div style={{position:"absolute",top:-14,left:"50%",transform:"translateX(-50%)"}}>
          <Badge color={K.redD}><FlameIcon size={13}/> 激怒模式！失誤懲罰增加</Badge></div>}
        {isVendor && <div style={{position:"absolute",top:-14,left:"50%",transform:"translateX(-50%)"}}>
          <Badge color={K.navyD}>採購評估委員會</Badge></div>}
        {isComparison && <div style={{position:"absolute",top:-14,left:"50%",transform:"translateX(-50%)"}}>
          <Badge color={K.purpleD}>技術對決擂台</Badge></div>}
        <div style={{display:"flex",alignItems:"center",gap:14}}>
          <div style={{animation:isVendor ? "float 3s infinite" : rage?"wobble .5s infinite":"bobBig 2.4s infinite"}}><BossC size={rage?92:84} rage={rage}/></div>
          <div style={{flex:1}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
              <Badge color={isVendor ? K.navyD : isComparison ? K.purple : rage?K.redD:K.red}>
                {isVendor ? "審查委員" : isComparison ? "技術對照組" : (level.boss?.n || "Boss")}
              </Badge>
              <span style={{fontSize:11,fontWeight:900,color:K.ink}}>
                {isVendor ? `認可度 ${100 - bossHp}%` : `HP ${Math.max(0, bossHp)}`}
              </span>
            </div>
            <div style={{height:16,background:"#fff",border:`3px solid ${K.ink}`,borderRadius:99,marginTop:6,overflow:"hidden"}}>
              <div style={{height:"100%",width:`${isVendor ? (100 - bossHp) : bossHp}%`,transition:"width .55s cubic-bezier(.2,.9,.3,1.3)",
                background:isVendor ? `linear-gradient(90deg,${K.green},${K.teal})` : `linear-gradient(90deg,${K.red},${K.orange})`,borderRadius:99}}/>
            </div>
            <div style={{display:"flex",gap:10,alignItems:"center",marginTop:8}}>
              <FlameIcon size={14}/>
              <div style={{flex:1,height:11,background:"#fff",border:`3px solid ${K.ink}`,borderRadius:99,overflow:"hidden"}}>
                <div style={{height:"100%",width:`${heat}%`,transition:"width .5s",background:K.orange,borderRadius:99}}/>
              </div>
              <Badge color={K.blue}><SnowIcon size={13}/>{energy}</Badge>
              {combo>=2&&<span style={{fontSize:16,fontWeight:900,color:K.yellowD,animation:"pop .35s",textShadow:"2px 2px 0 #fff"}}><StarIcon size={16}/>x{combo}</span>}
            </div>
          </div>
        </div>
      </Panel>

      <Panel bg={isVendor ? "#F5F6F9" : isComparison ? "#FDFBFF" : K.cream} style={{marginTop:12}}>
        {isCalc && prob ? (
          <>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <Badge color={K.orange}>計算試煉 {calcStage+1}/3 — {prob.label}</Badge>
              <Diff n={prob.d}/>
            </div>
            <div style={{background:K.paper,border:`3px solid ${K.ink}`,borderRadius:14,padding:"12px 16px",
              fontWeight:800,color:K.ink,fontSize:14,lineHeight:2}}>{prob.ask}</div>
            <div style={{display:"flex",gap:10,marginTop:12}}>
              <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&!show&&checkCalc()}
                placeholder={`輸入 ${prob.unit||'數值'}（誤差 ±5%）`} inputMode="decimal"
                style={{flex:1,background:"#fff",border:`4px solid ${K.ink}`,borderRadius:16,padding:"12px 16px",
                  fontSize:17,fontWeight:900,color:K.ink,outline:"none"}}/>
              {!show&&<NBtn color={K.red} onClick={checkCalc}>發射!</NBtn>}
            </div>
            {hint&&<div style={{marginTop:10,fontSize:13,fontWeight:900,color:K.purpleD}}>提示：{prob.steps?.[0]}</div>}
          </>
        ) : q ? (
          <>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
              <Badge color={isVendor ? K.navyD : isComparison ? K.purpleD : K.purple}>
                {isVendor ? "採購卷宗" : isComparison ? "對決項目" : `第 ${idx+1}/${total} 題`}
              </Badge>
              <Diff n={curD}/>
            </div>
            <div style={{fontSize:16,fontWeight:900,color:K.ink,lineHeight:1.7,marginBottom:12}}>{q.q}</div>
            <div style={{display:"grid",gap:9}}>
              {q.opts.map((o,i)=>{
                if (removed.includes(i)) return (
                  <div key={i} style={{border:`3px dashed #C9BCA4`,borderRadius:16,padding:"11px 14px",color:"#B5A78F",
                    fontSize:13,fontWeight:900,textDecoration:"line-through"}}>已被過濾</div>);
                const isAns=i===q.ans, isPick=picked===i;
                let bd=K.ink, bg="#fff";
                if (show&&isAns) {bd=K.greenD;bg="#E2FFE9";}
                else if (show&&isPick&&!isAns) {bd=K.redD;bg="#FFE3E3";}
                else if (isPick) {bd=isVendor ? K.navy : isComparison ? K.purpleD : K.blueD;bg=isVendor ? "#E8EAF6" : isComparison ? "#F3E5F5" : "#E3F3FF";}
                
                const btnLabels = ["Y", "X", "A", "B"];
                const btnColors = [K.green, K.blue, K.red, K.yellow];
                const btnShadows = [K.greenD, K.blueD, K.redD, K.yellowD];
                
                return (
                  <div key={i} className="opt" onClick={()=>!show&&setPicked(i)}
                    style={{display:"flex",alignItems:"center",border:`4px solid ${bd}`,background:bg,borderRadius:16,padding:"10px 14px",
                      color:K.ink,fontSize:14.5,fontWeight:900,cursor:show?"default":"pointer",
                      boxShadow:isPick&&!show?`0 4px 0 ${bd}`:"0 3px 0 rgba(0,0,0,.1)",transition:"all .12s"}}>
                    <span style={{
                      display: "inline-flex",
                      alignItems: "center",
                      justifyContent: "center",
                      width: 26,
                      height: 26,
                      borderRadius: "50%",
                      background: btnColors[i] || K.dim,
                      border: `3px solid ${K.ink}`,
                      color: "#fff",
                      fontSize: 12,
                      fontWeight: 900,
                      textShadow: "0 1.5px 0 rgba(0,0,0,0.3)",
                      boxShadow: `0 2.5px 0 ${btnShadows[i] || K.ink}`,
                      marginRight: 10,
                      flexShrink: 0
                    }}>
                      {btnLabels[i] || "?"}
                    </span>
                    <span style={{flex:1}}>{o}</span>
                  </div>);
              })}
            </div>
            {hint&&!show&&<div style={{marginTop:10,fontSize:12,fontWeight:900,color:K.purpleD}}>提示：回想之前的課程與筆記！</div>}
          </>
        ) : null}

        {show&&(
          <div style={{marginTop:12,background:ok?"#E2FFE9":"#FFF0E3",border:`4px solid ${ok?K.greenD:K.orangeD}`,
            borderRadius:16,padding:"12px 16px",fontSize:13,fontWeight:900,color:K.ink,lineHeight:1.85,animation:"bounceIn .35s"}}>
            {ok 
              ? (isVendor ? "審查通過！技術規格核實無誤。" : isComparison ? "分析正確！戰略判斷無懈可擊！" : "漂亮！會心一擊！")
              : (isVendor ? "規格不符！請仔細比對廠商技術卡。" : isComparison ? "判斷失準！請重新研判技術差異。" : "答錯了～放心，不扣血！知識點先做記號，等等去修復小屋補強。")}
            <br/>
            <span style={{color:"#7A6248",fontWeight:700}}>
              {isCalc&&prob?<>正解 ≈ {prob.answer.toFixed(1)} {prob.unit||''}。{prob.steps?.join("；")}</>:(q?.ex||"")}
            </span>
          </div>
        )}

        {!show ? (
          <div style={{display:"flex",gap:8,marginTop:14}}>
            {!isCalc&&<NBtn color={isVendor ? K.navy : isComparison ? K.purple : K.blue} disabled={energy<30} onClick={skillFreeze} style={{flex:1,fontSize:11,padding:"10px 4px"}}>
              {isVendor ? "規格過濾" : isComparison ? "指標篩選" : "液氮急凍"}<br/>-30 <SnowIcon size={12}/>
            </NBtn>}
            <NBtn color={isVendor ? K.purple : isComparison ? K.orange : K.purple} disabled={energy<40||hint} onClick={skillCFD} style={{flex:1,fontSize:11,padding:"10px 4px"}}>
              {isVendor ? "審查提示" : isComparison ? "對比分析" : "CFD 提示"}<br/>-40 <SnowIcon size={12}/>
            </NBtn>
            {!isCalc&&<NBtn color={K.red} disabled={picked===null} onClick={()=>fire(picked===q.ans,q?.tag)} style={{flex:1.3}}>
              {isVendor ? "核准決標!" : isComparison ? "確認判斷!" : "出招!"}
            </NBtn>}
          </div>
        ) : (
          <div style={{marginTop:14,textAlign:"right"}}>
            <NBtn color={K.green} onClick={next}>
              {isCalc?(ok?(calcStage>=2?"結算 →":"下一試煉 →"):"再算一次!"):(idx+1>=total||bossHp<=0?"結算 →":"下一題 →")}
            </NBtn>
          </div>
        )}
      </Panel>
      <div style={{textAlign:"center",marginTop:12}}>
        <NBtn color="#C9BCA4" shadow="#A39580" onClick={onBack} style={{fontSize:11,padding:"7px 18px"}}>← 先撤退</NBtn>
      </div>
    </div>
  );
}

      <div style={{fontSize:13,fontWeight:900,color:"#7A6248",margin:"6px 0 14px"}}>

      </div>
      {card&&level.kind!=="repair"&&(()=>{
        const Icon = ICON_MAP[card.icon] || BookIcon;
        return (
          <div style={{display:"inline-block",animation:"pop .6s .2s both"}}>
            <Panel bg="#fff" style={{width:220,textAlign:"left"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                <Icon size={34}/>
                <Badge color={card.c}>{card.r}</Badge>
              </div>
              <div style={{fontWeight:900,color:K.ink,fontSize:15,margin:"8px 0 6px"}}>{card.name}</div>
              <div style={{background:K.paper,border:`3px solid ${K.ink}`,borderRadius:12,padding:"6px 10px",fontSize:12,fontWeight:900,color:K.ink}}>{card.f}</div>

      <div style={{marginTop:18}}><NBtn color={K.green} big onClick={onDone}>拿獎勵回地圖！ <CoinIcon size={18}/>+20</NBtn></div>
    </div>
  );
}

            </div>
          </div>
          
          <div style={{
            background: K.yellow,
            border: `3px solid ${K.ink}`,
            borderRadius: 99,
            padding: "5px 16px",
            fontSize: 12,
            fontWeight: 900,
            color: K.ink,
            boxShadow: `0 3px 0 ${K.yellowD}`,
            transform: "rotate(1.5deg)"
          }}>
            冷卻宇宙的守護者
          </div>
          
          <div style={{margin: "16px 0 6px", animation: "pressHint 1.4s infinite"}}>
            <NBtn color={K.red} big onClick={onStart} style={{fontSize: 18, padding: "12px 36px", display: "inline-flex", alignItems: "center", gap: 8}}>
              <span style={{
                display: "inline-flex",
                alignItems: "center",
                justifyContent: "center",
                width: 22,
                height: 22,
                borderRadius: "50%",
                background: "#fff",
                color: K.red,
                border: `2.5px solid ${K.ink}`,
                fontSize: 12,
                fontWeight: 900,
                boxShadow: `0 1.5px 0 rgba(0,0,0,0.2)`
              }}>A</span>
              START!
            </NBtn>
          </div>
          
          <div style={{fontSize: 10, fontWeight: 900, color: K.ink, opacity: 0.6, marginTop: 2}}>
            知識來源：你的 Obsidian 筆記（{LEVELS.filter(l=>l.kind!=='repair').length} 關）・自動存檔
          </div>
        </div>
        
        {/* Right Joy-Con */}
        <JoyConRight onActionA={onStart}/>
      </div>
    </div>
  );
}

/* ================================================================
   14. App 主程式
   ================================================================ */
function App() {
  const [title,setTitle] = useState(true);
  const [screen,setScreen] = useState("world");     // world | region | level
  const [phase,setPhase] = useState("intel");        // intel | battle | result
  const [region,setRegion] = useState(null);
  const [lv,setLv] = useState(null);
  const [result,setResult] = useState(null);
  const [p,setP] = useState({...DEF});
  const [loaded,setLoaded] = useState(false);
  const [viewMode, setViewMode] = useState("map");

  useEffect(()=>{ setP(loadSave()); setLoaded(true); },[]);
  useEffect(()=>{ if (loaded) persistSave(p); },[p,loaded]);

  const selectRegion = r => { setRegion(r); setScreen("region"); };
  const enterLevel = l => { setLv(l); setPhase(l.kind==="repair"?"battle":"intel"); setScreen("level"); };
  const enterRepair = () => {
    const repLv = getRepairLevel();
    if (repLv) enterLevel(repLv);
  };
  const win = r => {
    setResult(r); setPhase("result");
    setP(prev=>{
      const completed = {...prev.completed,[lv.id]:{grade:r.grade}};
      const cards = lv.kind!=="repair"&&!prev.cards.includes(lv.id) ? [...prev.cards,lv.id] : prev.cards;
      let weak = [...new Set([...prev.weak,...r.miss])];
      if (lv.kind==="repair") weak = weak.filter(w=>r.miss.includes(w));
      return {...prev,xp:prev.xp+(r.grade==="S"?80:r.grade==="A"?60:40),coins:prev.coins+20,
        energy:r.energyLeft,completed,cards,weak};
    });
  };
  const backToRegion = () => { setScreen("region"); setLv(null); setPhase("intel"); };
  const backToWorld = () => { setScreen("world"); setRegion(null); };

  return (
    <div style={{minHeight:"100vh",background:`linear-gradient(180deg,${K.sky1},${K.sky2})`,position:"relative",overflow:"hidden"}}>
      <Style/><Clouds/>
      {title
        ? <TitleScreen onStart={()=>setTitle(false)}/>
        : <div style={{
            position:"relative",
            zIndex:2,
            maxWidth: (screen === "world" && viewMode === "map") || screen === "region" ? 1200 : 560,
            margin:"0 auto",
            padding:"14px 14px 60px",
            transition:"max-width 0.25s cubic-bezier(0.2, 0.8, 0.2, 1)"
          }}>
            <Hud p={p} showBack={screen!=="world"} onBack={screen==="level"?backToRegion:backToWorld}/>
            <div style={{height:12}}/>
            {screen==="world"&&<WorldSelectScreen p={p} onSelectRegion={selectRegion} onRepair={enterRepair} viewMode={viewMode} setViewMode={setViewMode}/>}
            {screen==="region"&&<RegionMapScreen region={region} p={p} onEnter={enterLevel} onBack={backToWorld}/>}
            {screen==="level"&&phase==="intel"&&<IntelPhase levelId={lv.id} boss={lv.boss} onStart={()=>setPhase("battle")} onBack={backToRegion}/>}
            {screen==="level"&&phase==="battle"&&<Battle level={lv} p={p} onWin={win} onBack={backToRegion} repairTags={p.weak}/>}
            {screen==="level"&&phase==="result"&&<ResultScreen level={lv} result={result} onDone={backToRegion}/>}
          </div>}
    </div>
  );
}

/* ================================================================
   15. 掛載
   ================================================================ */
const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);

  </script>
</body>
