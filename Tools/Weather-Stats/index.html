    <script>
        const LOCATIONS = Object.values(WEATHER_DATA);
        let myGlobe = null;
        let selectedId = null;

        // ------------------------------------------------------------------
        // 標記顏色：依 0.4% 冷卻設計濕球溫度（wb04）做冷暖色階（藍→橘→紅）。
        // 三個色標都取自既有 dataviz 色票（--series-low / 既有分類色橘 / --series-high），
        // 避免引入新色相、也避免彩虹色階（見 dataviz skill 反模式）。
        // ------------------------------------------------------------------
        const WB_COLOR_STOPS = [
            { stop: 0,   rgb: [0x39, 0x87, 0xe5] }, // 藍：低濕球
            { stop: 0.5, rgb: [0xd9, 0x59, 0x26] }, // 橘：中間
            { stop: 1,   rgb: [0xe6, 0x67, 0x67] }, // 紅：高濕球
        ];

        function interpolateColor(stops, t) {
            t = Math.max(0, Math.min(1, t));
            for (let i = 0; i < stops.length - 1; i++) {
                const a = stops[i], b = stops[i + 1];
                if (t >= a.stop && t <= b.stop) {
                    const lt = (t - a.stop) / (b.stop - a.stop || 1);
                    const r = Math.round(a.rgb[0] + (b.rgb[0] - a.rgb[0]) * lt);
                    const g = Math.round(a.rgb[1] + (b.rgb[1] - a.rgb[1]) * lt);
                    const bch = Math.round(a.rgb[2] + (b.rgb[2] - a.rgb[2]) * lt);
                    return `rgb(${r}, ${g}, ${bch})`;
                }
            }
            const last = stops[stops.length - 1].rgb;
            return `rgb(${last[0]}, ${last[1]}, ${last[2]})`;
        }

        function getWb04(d) {
            return d.design && d.design.cooling && d.design.cooling.wb && d.design.cooling.wb['0.4']
                ? d.design.cooling.wb['0.4'].value
                : null;
        }

        const WB04_VALUES = LOCATIONS.map(getWb04).filter(v => v != null);
        const WB04_MIN = WB04_VALUES.length ? Math.min(...WB04_VALUES) : 0;
        const WB04_MAX = WB04_VALUES.length ? Math.max(...WB04_VALUES) : 1;

        function markerColor(d) {
            const wb = getWb04(d);
            if (wb == null) return 'rgb(56, 189, 248)'; // fallback：無設計條件資料時退回原本 sky-400
            const t = (wb - WB04_MIN) / ((WB04_MAX - WB04_MIN) || 1);
            return interpolateColor(WB_COLOR_STOPS, t);
        }

        function renderWbLegend() {
            const labels = document.getElementById('wbLegendLabels');
            if (!labels) return;
            labels.innerHTML = `<span>${WB04_MIN}°C</span><span>${WB04_MAX}°C</span>`;
        }

        // ------------------------------------------------------------------
        // 城市清單側欄：依洲別分組（沿用 LOCATIONS 原始順序，等同 天氣統計/<洲>/ 目錄結構）
        // ------------------------------------------------------------------
        function buildCitySelector() {
            const list = document.getElementById('citySelectorList');
            if (!list) return;
            list.innerHTML = '';

            const groups = {};
            const order = [];
            LOCATIONS.forEach(d => {
                if (!groups[d.continent]) { groups[d.continent] = []; order.push(d.continent); }
                groups[d.continent].push(d);
            });

            order.forEach(continent => {
                const groupEl = document.createElement('div');
                groupEl.className = 'mb-2 last:mb-0';

                const heading = document.createElement('p');
                heading.className = 'text-[9px] font-mono text-slate-500 uppercase tracking-[0.15em] px-2 pt-1 pb-0.5';
                heading.textContent = continent;
                groupEl.appendChild(heading);

                groups[continent].forEach(d => {
                    const btn = document.createElement('button');
                    btn.type = 'button';
                    btn.dataset.cityId = d.id;
                    btn.className = 'city-selector-item w-full text-left px-2 py-1.5 rounded-lg text-[11px] text-slate-200 hover:bg-white/10 transition-colors flex items-center justify-between gap-2';
                    btn.innerHTML = `<span class="truncate">${d.name}</span><span class="text-slate-500 text-[9px] shrink-0">${d.country}</span>`;
                    btn.onclick = () => selectLocation(d.id);
                    groupEl.appendChild(btn);
                });

                list.appendChild(groupEl);
            });

            updateCitySelectorActiveState();
        }

        function updateCitySelectorActiveState() {
            document.querySelectorAll('.city-selector-item').forEach(btn => {
                const active = btn.dataset.cityId === selectedId;
                btn.classList.toggle('bg-white/10', active);
                btn.classList.toggle('text-white', active);
                btn.classList.toggle('font-semibold', active);
            });
        }

        function initGlobe() {
            const container = document.getElementById('globeViz');
            if (!container || typeof Globe === 'undefined') return;

            myGlobe = Globe()(container)
                .backgroundColor('rgba(0,0,0,0)')
                .showAtmosphere(true).atmosphereColor('#bae6fd').atmosphereAltitude(0.2)
                .globeImageUrl('https://unpkg.com/three-globe/example/img/earth-blue-marble.jpg')
                .bumpImageUrl('https://unpkg.com/three-globe/example/img/earth-topology.png')
                .htmlElementsData(LOCATIONS)
                .htmlLat(d => d.lat)
                .htmlLng(d => d.lon)
                .htmlElement(d => {
                    const el = document.createElement('div');
                    const color = markerColor(d);
                    const wb04 = getWb04(d);
                    el.innerHTML = `
                        <div class="flex items-center gap-2 cursor-pointer group pointer-events-auto" style="transform: translate(-50%, -50%);">
                            <div class="relative flex h-3 w-3 sm:h-4 sm:w-4">
                                <span class="absolute inline-flex h-full w-full rounded-full globe-marker-ping" style="background:${color};"></span>
                                <span class="relative inline-flex rounded-full h-3 w-3 sm:h-4 sm:w-4 shadow-[0_0_8px_rgba(255,255,255,0.8)] border border-white/80" style="background:${color};"></span>
                            </div>
                            <div class="hidden group-hover:block px-2.5 py-1 bg-slate-900/90 backdrop-blur-md text-white text-[11px] font-bold rounded-lg whitespace-nowrap border border-white/20 shadow-xl">
                                ${d.name}${wb04 != null ? ` · WB0.4% ${wb04}°C` : ''}
                            </div>
                        </div>
                    `;
                    el.onclick = () => selectLocation(d.id);
                    return el;
                })
                .htmlAltitude(0.02);

            myGlobe.controls().autoRotate = true;
            myGlobe.controls().autoRotateSpeed = 0.8;
            myGlobe.controls().enableZoom = true;

            const resizeObserver = new ResizeObserver(entries => {
                for (const entry of entries) {
                    const { width, height } = entry.contentRect;
                    if (width && height && myGlobe) { myGlobe.width(width); myGlobe.height(height); }
                }
            });
            resizeObserver.observe(container);

            let idleTimeout = null;
            function resetIdleTimer() {
                clearTimeout(idleTimeout);
                idleTimeout = setTimeout(() => {
                    if (myGlobe) { myGlobe.controls().autoRotate = true; myGlobe.controls().autoRotateSpeed = 0.8; }
                }, 10000);
            }
            ['mousedown', 'wheel', 'touchstart'].forEach(evt =>
                container.addEventListener(evt, resetIdleTimer, { passive: true })
            );

            buildCitySelector();
            renderWbLegend();

            const toggleBtn = document.getElementById('citySelectorToggle');
            const listEl = document.getElementById('citySelectorList');
            const chevron = document.getElementById('citySelectorChevron');
            if (toggleBtn && listEl) {
                toggleBtn.onclick = () => {
                    const collapsed = listEl.classList.toggle('hidden');
                    if (chevron) chevron.style.transform = collapsed ? 'rotate(-90deg)' : '';
                };
            }

            // 預設選第一個地點
            if (LOCATIONS.length) selectLocation(LOCATIONS[0].id);
        }

        function selectLocation(id) {
            selectedId = id;
            const loc = WEATHER_DATA[id];
            if (!loc) return;
            renderDetailPanel(loc);
            updateCitySelectorActiveState();
            if (myGlobe) {
                myGlobe.controls().autoRotate = false;
                myGlobe.pointOfView({ lat: loc.lat, lng: loc.lon, altitude: 1.4 }, 1000);
            }
        }

        function svgEl(tag, attrs) {
            const el = document.createElementNS('http://www.w3.org/2000/svg', tag);
            for (const k in attrs) el.setAttribute(k, attrs[k]);
            return el;
        }

        // 月均溫範圍圖（浮動柱：avgLow ~ avgHigh，顏色依均溫冷暖漸層）
        function renderMonthlyTempChart(monthly) {
            const W = 380, H = 140, padL = 28, padR = 8, padT = 10, padB = 18;
            const plotW = W - padL - padR, plotH = H - padT - padB;
            const allTemps = monthly.flatMap(m => [m.avgHigh, m.avgLow]);
            const tMin = Math.floor(Math.min(...allTemps) - 2);
            const tMax = Math.ceil(Math.max(...allTemps) + 2);
            const y = t => padT + plotH * (1 - (t - tMin) / (tMax - tMin));
            const barW = plotW / 12 * 0.55;
            const step = plotW / 12;

            const svg = svgEl('svg', { viewBox: `0 0 ${W} ${H}`, class: 'w-full h-auto' });

            // gridlines
            for (let g = 0; g < 3; g++) {
                const gt = tMin + (tMax - tMin) * (g / 2);
                const gy = y(gt);
                svg.appendChild(svgEl('line', { x1: padL, x2: W - padR, y1: gy, y2: gy, class: 'chart-grid' }));
                const label = svgEl('text', { x: 4, y: gy + 3, class: 'chart-muted-text' });
                label.textContent = `${Math.round(gt)}°`;
                svg.appendChild(label);
            }

            monthly.forEach((m, i) => {
                const cx = padL + step * i + step / 2;
                const yHigh = y(m.avgHigh), yLow = y(m.avgLow);
                const grad = svgEl('linearGradient', { id: `tgrad${i}`, x1: 0, y1: 0, x2: 0, y2: 1 });
                grad.appendChild(svgEl('stop', { offset: '0%', 'stop-color': 'var(--series-high)' }));
                grad.appendChild(svgEl('stop', { offset: '100%', 'stop-color': 'var(--series-low)' }));
                svg.appendChild(grad);

                const bar = svgEl('rect', {
                    x: cx - barW / 2, y: yHigh, width: barW, height: Math.max(2, yLow - yHigh),
                    rx: barW / 2, fill: `url(#tgrad${i})`, opacity: 0.9,
                });
                const title = svgEl('title', {});
                title.textContent = `${m.month}月：${m.avgHigh}°C / ${m.avgLow}°C（均溫 ${m.avgMean}°C）`;
                bar.appendChild(title);
                svg.appendChild(bar);

                const label = svgEl('text', { x: cx, y: H - 4, 'text-anchor': 'middle', class: 'chart-muted-text' });
                label.textContent = m.month;
                svg.appendChild(label);
            });
            return svg;
        }

        // 月降雨量長條圖
        function renderMonthlyPrecipChart(monthly) {
            const W = 380, H = 90, padL = 34, padR = 8, padT = 8, padB = 18;
            const plotW = W - padL - padR, plotH = H - padT - padB;
            const pMax = Math.max(...monthly.map(m => m.avgPrecip), 1);
            const step = plotW / 12;
            const barW = step * 0.55;

            const svg = svgEl('svg', { viewBox: `0 0 ${W} ${H}`, class: 'w-full h-auto' });
            const gy = padT + plotH;
            svg.appendChild(svgEl('line', { x1: padL, x2: W - padR, y1: gy, y2: gy, class: 'chart-grid' }));
            const maxLabel = svgEl('text', { x: 2, y: padT + 6, class: 'chart-muted-text' });
            maxLabel.textContent = `${Math.round(pMax)}mm`;
            svg.appendChild(maxLabel);

            monthly.forEach((m, i) => {
                const cx = padL + step * i + step / 2;
                const h = plotH * (m.avgPrecip / pMax);
                const bar = svgEl('rect', {
                    x: cx - barW / 2, y: gy - h, width: barW, height: Math.max(1, h),
                    rx: 2, fill: 'var(--series-precip)', opacity: 0.85,
                });
                const title = svgEl('title', {});
                title.textContent = `${m.month}月平均降雨：${m.avgPrecip}mm`;
                bar.appendChild(title);
                svg.appendChild(bar);
            });
            return svg;
        }

        // 年均溫趨勢線
        function renderYearlyTrendChart(yearly) {
            const W = 380, H = 110, padL = 30, padR2 = 8, padT = 10, padB = 18;
            const plotW = W - padL - padR2, plotH = H - padT - padB;
            const temps = yearly.map(y => y.avgMean);
            const tMin = Math.floor(Math.min(...temps) - 0.5);
            const tMax = Math.ceil(Math.max(...temps) + 0.5);
            const x = i => padL + plotW * (i / (yearly.length - 1));
            const y = t => padT + plotH * (1 - (t - tMin) / (tMax - tMin || 1));

            const svg = svgEl('svg', { viewBox: `0 0 ${W} ${H}`, class: 'w-full h-auto' });

            const points = yearly.map((yr, i) => `${x(i)},${y(yr.avgMean)}`).join(' ');
            svg.appendChild(svgEl('polyline', { points, fill: 'none', stroke: 'var(--series-trend)', 'stroke-width': 2 }));

            yearly.forEach((yr, i) => {
                const cx = x(i), cy = y(yr.avgMean);
                const dot = svgEl('circle', { cx, cy, r: 3, fill: 'var(--series-trend)' });
                const title = svgEl('title', {});
                title.textContent = `${yr.year}：均溫 ${yr.avgMean}°C`;
                dot.appendChild(title);
                svg.appendChild(dot);

                const label = svgEl('text', { x: cx, y: H - 4, 'text-anchor': 'middle', class: 'chart-muted-text' });
                label.textContent = String(yr.year).slice(2);
                svg.appendChild(label);
            });
            return svg;
        }

        function kpiCard(label, value, unit) {
            const div = document.createElement('div');
            div.className = 'glass-card rounded-xl p-3';
            div.innerHTML = `
                <p class="text-[9px] font-mono text-slate-400 uppercase tracking-[0.15em] mb-1">${label}</p>
                <p class="heading text-xl font-bold text-white">${value}<span class="text-xs text-slate-400 ml-0.5">${unit}</span></p>
            `;
            return div;
        }

        // 設計條件用的小標題與表格 helper（沿用既有 text-[9px]/[10px] font-mono uppercase 風格）
        function subheading(text, extraClass) {
            const p = document.createElement('p');
            p.className = `text-[9px] font-mono text-slate-500 uppercase tracking-[0.1em] mb-1.5 ${extraClass || ''}`;
            p.textContent = text;
            return p;
        }

        function designTable(headers, rows) {
            const table = document.createElement('table');
            table.className = 'w-full text-[10px] font-mono border-separate border-spacing-y-1';
            const thead = document.createElement('thead');
            thead.innerHTML = `<tr>${headers.map(h => `<th class="text-left text-slate-500 uppercase tracking-[0.08em] font-normal pb-1 pr-2">${h}</th>`).join('')}</tr>`;
            table.appendChild(thead);
            const tbody = document.createElement('tbody');
            rows.forEach(r => {
                const tr = document.createElement('tr');
                tr.innerHTML = r.map((c, i) => `<td class="${i === 0 ? 'text-white font-semibold' : 'text-slate-300'} pr-2 py-0.5 whitespace-nowrap">${c}</td>`).join('');
                tbody.appendChild(tr);
            });
            table.appendChild(tbody);
            return table;
        }

        // 「設計條件」區塊：對應筆記的 ASHRAE 風格設計條件表，改用緊湊表格 + KPI 卡呈現。
        function renderDesignSection(design) {
            const wrap = document.createElement('div');
            wrap.className = 'mt-5';

            const title = document.createElement('p');
            title.className = 'text-[10px] font-mono text-slate-400 uppercase tracking-[0.15em] mb-2';
            title.textContent = '設計條件（ASHRAE 風格）';
            wrap.appendChild(title);

            if (!design) {
                const empty = document.createElement('p');
                empty.className = 'text-[11px] text-slate-500';
                empty.textContent = '無設計條件資料';
                wrap.appendChild(empty);
                return wrap;
            }

            // 冷房設計條件
            wrap.appendChild(subheading('冷房設計條件 Cooling'));
            const pcts = ['0.4', '1', '2'];
            const coolRows = pcts.map(p => {
                const db = design.cooling.db[p], wb = design.cooling.wb[p], dp = design.cooling.dp[p];
                return [
                    `${p}%`,
                    `${db.value}°C / ${db.mcwb}°C`,
                    `${wb.value}°C / ${wb.mcdb}°C`,
                    `${dp.value}°C / ${dp.humidityRatio_g_per_kg}g`,
                ];
            });
            wrap.appendChild(designTable(['百分位', 'DB / MCWB', 'WB / MCDB', 'DP / 濕度比'], coolRows));

            // 暖房設計條件
            wrap.appendChild(subheading('暖房設計條件 Heating', 'mt-4'));
            const heatRow = document.createElement('div');
            heatRow.className = 'grid grid-cols-2 gap-2';
            heatRow.appendChild(kpiCard('99.6% DB', design.heating['99.6'], '°C'));
            heatRow.appendChild(kpiCard('99% DB', design.heating['99'], '°C'));
            wrap.appendChild(heatRow);

            // 極端值
            wrap.appendChild(subheading('極端值 Extremes（10年）', 'mt-4'));
            wrap.appendChild(designTable(['項目', '數值', '發生年月'], [
                ['最高DB', `${design.extremes.maxDB.value}°C`, design.extremes.maxDB.yearMonth],
                ['最低DB', `${design.extremes.minDB.value}°C`, design.extremes.minDB.yearMonth],
                ['最高WB', `${design.extremes.maxWB.value}°C`, design.extremes.maxWB.yearMonth],
            ]));

            // 度日
            wrap.appendChild(subheading('度日 Degree Days', 'mt-4'));
            const ddRow = document.createElement('div');
            ddRow.className = 'grid grid-cols-3 gap-2';
            ddRow.appendChild(kpiCard('HDD18.3', design.degreeDays.hdd18_3, '°C·d'));
            ddRow.appendChild(kpiCard('CDD18.3', design.degreeDays.cdd18_3, '°C·d'));
            ddRow.appendChild(kpiCard('CDD10', design.degreeDays.cdd10, '°C·d'));
            wrap.appendChild(ddRow);

            // 自然冷卻時數
            wrap.appendChild(subheading('自然冷卻時數 Free Cooling（hr/year）', 'mt-4'));
            const fcRow = document.createElement('div');
            fcRow.className = 'grid grid-cols-2 gap-2';
            fcRow.appendChild(kpiCard('氣側 Air-side', design.freeCooling.airSideHoursPerYear, 'hr'));
            fcRow.appendChild(kpiCard('水側 Water-side', design.freeCooling.waterSideHoursPerYear, 'hr'));
            wrap.appendChild(fcRow);
            const fcNote = document.createElement('p');
            fcNote.className = 'text-[9px] text-slate-500 mt-1.5 leading-relaxed';
            fcNote.title = design.freeCooling.assumption;
            fcNote.textContent = design.freeCooling.assumption;
            wrap.appendChild(fcNote);

            // 高濕球時數
            wrap.appendChild(subheading('高濕球時數 High Wet-Bulb Hours（hr/year）', 'mt-4'));
            const hwbRow = document.createElement('div');
            hwbRow.className = 'grid grid-cols-3 gap-2';
            hwbRow.appendChild(kpiCard('>24°C', design.highWetBulbHours.over24, 'hr'));
            hwbRow.appendChild(kpiCard('>26°C', design.highWetBulbHours.over26, 'hr'));
            hwbRow.appendChild(kpiCard('>28°C', design.highWetBulbHours.over28, 'hr'));
            wrap.appendChild(hwbRow);

            // ASHRAE 169 氣候分區
            wrap.appendChild(subheading('ASHRAE 169 氣候分區', 'mt-4'));
            const zoneCard = document.createElement('div');
            zoneCard.className = 'glass-card rounded-xl p-3';
            if (design.ashraeZone) {
                zoneCard.innerHTML = `
                    <p class="heading text-lg font-bold text-white">Zone ${design.ashraeZone.zone}</p>
                    <p class="text-[10px] text-slate-400 mt-1">${design.ashraeZone.rule}</p>
                `;
            } else {
                zoneCard.innerHTML = `<p class="text-[11px] text-slate-500">未分區（資料不足，避免編造）</p>`;
            }
            wrap.appendChild(zoneCard);

            return wrap;
        }

        function renderDetailPanel(loc) {
            const panel = document.getElementById('detailPanel');
            panel.innerHTML = '';

            const header = document.createElement('div');
            header.innerHTML = `
                <h2 class="heading text-2xl font-bold text-white">${loc.name}</h2>
                <p class="text-[11px] font-mono text-slate-400 uppercase tracking-[0.15em] mt-1">${loc.lat.toFixed(2)}°N, ${loc.lon.toFixed(2)}°E · ${loc.range.startYear}–${loc.range.endYear}</p>
            `;
            panel.appendChild(header);

            const kpiRow = document.createElement('div');
            kpiRow.className = 'grid grid-cols-2 gap-2 mt-4';
            kpiRow.appendChild(kpiCard('10年平均氣溫', loc.summary.overallAvgMean, '°C'));
            kpiRow.appendChild(kpiCard('年均降雨量', loc.summary.overallAvgPrecip, 'mm'));
            kpiRow.appendChild(kpiCard('最熱年份', loc.summary.hottestYear, ''));
            kpiRow.appendChild(kpiCard('最冷年份', loc.summary.coldestYear, ''));
            panel.appendChild(kpiRow);

            const tempSection = document.createElement('div');
            tempSection.className = 'mt-5';
            tempSection.innerHTML = `<p class="text-[10px] font-mono text-slate-400 uppercase tracking-[0.15em] mb-2">月均溫範圍（10年平均，高溫→低溫）</p>`;
            tempSection.appendChild(renderMonthlyTempChart(loc.monthly));
            panel.appendChild(tempSection);

            const precipSection = document.createElement('div');
            precipSection.className = 'mt-4';
            precipSection.innerHTML = `<p class="text-[10px] font-mono text-slate-400 uppercase tracking-[0.15em] mb-2">月均降雨量（10年平均）</p>`;
            precipSection.appendChild(renderMonthlyPrecipChart(loc.monthly));
            panel.appendChild(precipSection);

            const trendSection = document.createElement('div');
            trendSection.className = 'mt-4';
            trendSection.innerHTML = `<p class="text-[10px] font-mono text-slate-400 uppercase tracking-[0.15em] mb-2">年均溫趨勢（${loc.range.startYear}–${loc.range.endYear}）</p>`;
            trendSection.appendChild(renderYearlyTrendChart(loc.yearly));
            panel.appendChild(trendSection);

            panel.appendChild(renderDesignSection(loc.design));
        }

        setTimeout(initGlobe, 100);
    </script>
</body>
</html>
